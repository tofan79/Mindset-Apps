# ╔══════════════════════════════════════════════════════════════╗
# ║     MINDSET-APPS — TEMPLATE WORKFLOW (TAR BUILD)           ║
# ║  Untuk app yang TIDAK punya .rpm di GitHub Releases        ║
# ║  Cara pakai: duplikat file ini, ganti bagian env: saja     ║
# ╚══════════════════════════════════════════════════════════════╝

name: "namaapp - COPR Auto Build"

on:
  schedule:
    - cron: '0 2 */3 * *'   # tiap 3 hari — ganti jamnya biar tidak barengan
  workflow_dispatch:

# ┌─────────────────────────────────────────────────────────────┐
# │  EDIT BAGIAN INI SAJA untuk app baru                       │
# └─────────────────────────────────────────────────────────────┘
env:
  APP_NAME:       "namaapp"                    # nama package RPM
  GITHUB_REPO:    "owner/repo"                 # repo GitHub upstream
  COPR_PROJECT:   "Mindset-Apps"               # jangan diubah
  TAR_PATTERN:    "namaapp-{VERSION}-linux.tar.gz"  # pola nama file, {VERSION} = placeholder
  SPEC_FILE:      "specs/namaapp.spec"         # path ke .spec file

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get upstream latest version
        id: upstream
        run: |
          VER=$(curl -s \
            "https://api.github.com/repos/${{ env.GITHUB_REPO }}/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "▶ Upstream: $VER"

      - name: Get current COPR version
        id: copr
        run: |
          CURRENT=$(curl -s \
            "https://copr.fedorainfracloud.org/api_3/package/?ownername=${{ secrets.COPR_USERNAME }}&projectname=${{ env.COPR_PROJECT }}&packagename=${{ env.APP_NAME }}" \
            | jq -r '.builds.latest.source_package.version // "none"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "▶ COPR: $CURRENT"

      - name: Smart Skip
        id: check
        run: |
          UP="${{ steps.upstream.outputs.version }}"
          CP="${{ steps.copr.outputs.version }}"
          if [ "$UP" = "$CP" ]; then
            echo "✅ Up-to-date ($UP), skip."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "🆕 Update $CP → $UP"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm build-essential wget
          pip install copr-cli --quiet

      - name: Download tar
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          FILENAME="${{ env.TAR_PATTERN }}"
          FILENAME="${FILENAME/\{VERSION\}/$VER}"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          wget -q "https://github.com/${{ env.GITHUB_REPO }}/releases/download/v${VER}/${FILENAME}"

      - name: Build SRPM
        if: steps.check.outputs.skip == 'false'
        id: srpm
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          SPECNAME=$(basename ${{ env.SPEC_FILE }})
          mkdir -p ~/rpmbuild/{SPECS,SOURCES,SRPMS}
          cp ${{ env.SPEC_FILE }} ~/rpmbuild/SPECS/
          sed -i "s/%{pkg_version}/$VER/g" ~/rpmbuild/SPECS/${SPECNAME}
          cp "$FILENAME" ~/rpmbuild/SOURCES/
          rpmbuild -bs ~/rpmbuild/SPECS/${SPECNAME}
          SRPM=$(ls ~/rpmbuild/SRPMS/*.src.rpm)
          echo "path=$SRPM" >> $GITHUB_OUTPUT

      - name: Setup COPR credentials
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          username = ${{ secrets.COPR_USERNAME }}
          login    = ${{ secrets.COPR_LOGIN }}
          token    = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Submit to COPR
        if: steps.check.outputs.skip == 'false'
        run: copr-cli build ${{ env.COPR_PROJECT }} ${{ steps.srpm.outputs.path }}
