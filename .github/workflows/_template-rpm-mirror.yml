# ╔══════════════════════════════════════════════════════════════╗
# ║     MINDSET-APPS — TEMPLATE WORKFLOW (RPM MIRROR)          ║
# ║  Untuk app yang SUDAH punya .rpm di GitHub Releases        ║
# ║  Cara pakai: duplikat file ini, ganti bagian env: saja     ║
# ╚══════════════════════════════════════════════════════════════╝

name: "namaapp - COPR Auto Mirror"

on:
  schedule:
    - cron: '0 2 */3 * *'   # tiap 3 hari — ganti jamnya biar tidak barengan
  workflow_dispatch:

# ┌─────────────────────────────────────────────────────────────┐
# │  EDIT BAGIAN INI SAJA untuk app baru                       │
# └─────────────────────────────────────────────────────────────┘
env:
  APP_NAME:       "namaapp"                        # nama package RPM
  GITHUB_REPO:    "owner/repo"                     # repo GitHub upstream
  COPR_PROJECT:   "Mindset-Apps"                   # jangan diubah
  RPM_PATTERN:    "namaapp-{VERSION}.x86_64.rpm"   # pola nama file RPM, {VERSION} = placeholder

jobs:
  check-and-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get upstream latest version
        id: upstream
        run: |
          VER=$(curl -s \
            "https://api.github.com/repos/${{ env.GITHUB_REPO }}/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "▶ Upstream: $VER"

      - name: Get current COPR version
        id: copr
        run: |
          CURRENT=$(curl -s \
            "https://copr.fedorainfracloud.org/api_3/package/?ownername=${{ secrets.COPR_USERNAME }}&projectname=${{ env.COPR_PROJECT }}&packagename=${{ env.APP_NAME }}" \
            | jq -r '.builds.latest.source_package.version // "none"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "▶ COPR: $CURRENT"

      - name: Smart Skip
        id: check
        run: |
          UP="${{ steps.upstream.outputs.version }}"
          CP="${{ steps.copr.outputs.version }}"
          if [ "$UP" = "$CP" ]; then
            echo "✅ Up-to-date ($UP), skip."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "🆕 Update $CP → $UP"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install copr-cli
        if: steps.check.outputs.skip == 'false'
        run: pip install copr-cli --quiet

      - name: Download RPM
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          FILENAME="${{ env.RPM_PATTERN }}"
          FILENAME="${FILENAME/\{VERSION\}/$VER}"
          URL="https://github.com/${{ env.GITHUB_REPO }}/releases/download/v${VER}/${FILENAME}"
          echo "▶ Downloading: $URL"
          wget -q "$URL" -O app.rpm

      - name: Setup COPR credentials
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          username = ${{ secrets.COPR_USERNAME }}
          login    = ${{ secrets.COPR_LOGIN }}
          token    = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Submit to COPR
        if: steps.check.outputs.skip == 'false'
        run: copr-cli build ${{ env.COPR_PROJECT }} app.rpm
