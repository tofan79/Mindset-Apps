name: "wl-screenrec - COPR Auto Build"

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

env:
  APP_NAME:       "wl-screenrec"
  GITHUB_REPO:    "russelltg/wl-screenrec"
  COPR_PROJECT:   "Mindset-Apps"
  SPEC_FILE:      "specs/wl-screenrec.spec"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get upstream latest version
        id: upstream
        run: |
          VER=$(curl -s \
            "https://api.github.com/repos/${{ env.GITHUB_REPO }}/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Upstream: $VER"

      - name: Get current COPR version
        id: copr
        run: |
          CURRENT=$(curl -s \
            "https://copr.fedorainfracloud.org/api_3/package/?ownername=${{ secrets.COPR_USERNAME }}&projectname=${{ env.COPR_PROJECT }}&packagename=${{ env.APP_NAME }}" \
            | jq -r '.builds.latest.source_package.version // "none"' 2>/dev/null || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "COPR: $CURRENT"

      - name: Smart Skip
        id: check
        run: |
          UP="${{ steps.upstream.outputs.version }}"
          CP="${{ steps.copr.outputs.version }}"
          if [ "$UP" = "$CP" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm build-essential wget
          pip install copr-cli --quiet

      - name: Install Rust
        if: steps.check.outputs.skip == 'false'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Download source
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          wget -q "https://github.com/${{ env.GITHUB_REPO }}/archive/v${VER}.tar.gz" \
            -O "${{ env.APP_NAME }}-${VER}.tar.gz"

      - name: Vendor Rust dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          tar xzf "${{ env.APP_NAME }}-${VER}.tar.gz"
          cd "${{ env.APP_NAME }}-${VER}"
          cargo vendor vendor > cargo-config.toml
          tar czf ../vendor.tar.gz vendor/ cargo-config.toml
          cd ..

      - name: Build SRPM
        if: steps.check.outputs.skip == 'false'
        id: srpm
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          mkdir -p ~/rpmbuild/{SPECS,SOURCES,SRPMS}
          cp ${{ env.SPEC_FILE }} ~/rpmbuild/SPECS/
          sed -i "s/%{pkg_version}/$VER/g" ~/rpmbuild/SPECS/${{ env.APP_NAME }}.spec
          cp "${{ env.APP_NAME }}-${VER}.tar.gz" ~/rpmbuild/SOURCES/
          cp vendor.tar.gz ~/rpmbuild/SOURCES/
          rpmbuild -bs ~/rpmbuild/SPECS/${{ env.APP_NAME }}.spec
          SRPM=$(ls ~/rpmbuild/SRPMS/*.src.rpm)
          echo "path=$SRPM" >> $GITHUB_OUTPUT

      - name: Setup COPR credentials
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          username = ${{ secrets.COPR_USERNAME }}
          login    = ${{ secrets.COPR_LOGIN }}
          token    = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Submit to COPR
        if: steps.check.outputs.skip == 'false'
        run: copr-cli build ${{ env.COPR_PROJECT }} ${{ steps.srpm.outputs.path }}
