name: "jetbrains-toolbox - COPR Auto Build"

on:
  schedule:
    - cron: '0 4 */3 * *'
  workflow_dispatch:

env:
  APP_NAME:       "jetbrains-toolbox"
  COPR_PROJECT:   "Mindset-Apps"
  SPEC_FILE:      "specs/jetbrains-toolbox.spec"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get upstream latest version
        id: upstream
        run: |
          VER=$(curl -s \
            "https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release" \
            | jq -r '.TBA[0].build')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "▶ Upstream: $VER"

      - name: Get current COPR version
        id: copr
        run: |
          CURRENT=$(curl -s \
            "https://copr.fedorainfracloud.org/api_3/package/?ownername=${{ secrets.COPR_USERNAME }}&projectname=${{ env.COPR_PROJECT }}&packagename=${{ env.APP_NAME }}" \
            | jq -r '.builds.latest.source_package.version // "none"' 2>/dev/null || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "▶ COPR: $CURRENT"

      - name: Smart Skip
        id: check
        run: |
          UP="${{ steps.upstream.outputs.version }}"
          CP="${{ steps.copr.outputs.version }}"
          if [ "$UP" = "$CP" ]; then
            echo "✅ Up-to-date ($UP), skip."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "🆕 Update $CP → $UP"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm build-essential wget
          pip install copr-cli --quiet

      - name: Download tar.gz
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          wget -q "https://download.jetbrains.com/toolbox/jetbrains-toolbox-${VER}.tar.gz"

      - name: Build SRPM
        if: steps.check.outputs.skip == 'false'
        id: srpm
        run: |
          VER="${{ steps.upstream.outputs.version }}"
          mkdir -p ~/rpmbuild/{SPECS,SOURCES,SRPMS}
          cp ${{ env.SPEC_FILE }} ~/rpmbuild/SPECS/
          sed -i "s/%{pkg_version}/$VER/g" ~/rpmbuild/SPECS/jetbrains-toolbox.spec
          cp "jetbrains-toolbox-${VER}.tar.gz" ~/rpmbuild/SOURCES/
          rpmbuild -bs ~/rpmbuild/SPECS/jetbrains-toolbox.spec
          SRPM=$(ls ~/rpmbuild/SRPMS/*.src.rpm)
          echo "path=$SRPM" >> $GITHUB_OUTPUT

      - name: Setup COPR credentials
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr << EOF
          [copr-cli]
          username = ${{ secrets.COPR_USERNAME }}
          login    = ${{ secrets.COPR_LOGIN }}
          token    = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Submit to COPR
        if: steps.check.outputs.skip == 'false'
        run: copr-cli build ${{ env.COPR_PROJECT }} ${{ steps.srpm.outputs.path }}
